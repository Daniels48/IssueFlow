services:
  api:
    build: .
    container_name: isf_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ws:
    build: .

    container_name: isf_ws

    command: python -m app.workers.ws

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      rabbitmq:
        condition: service_started

  celery:
    build: .

    container_name: isf_celery

    command: celery -A app.workers.celery_app worker --loglevel=info

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      rabbitmq:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: isf_db
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: isf_rabbit
    hostname: ${RABBIT__HOST}
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT__LOGIN}
      RABBITMQ_DEFAULT_PASS: ${RABBIT__PASSWORD}

volumes:
  postgres_data: